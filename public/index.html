<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blackboard</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title-block">
        <h1 id="boardTitle">Blackboard</h1>
        <p id="meta" class="meta">Connect Google Drive to load a board.</p>
      </div>
      <div class="header-meta">
        <div id="saveState" class="save-state">Local</div>
        <div class="status-strip" id="stats"></div>
      </div>
    </header>

    <section class="toolbar" aria-label="Blackboard controls">
      <input id="searchInput" class="search" type="search" placeholder="Search ID, title, body" autocomplete="off">
      <div class="filter-row" aria-label="Status filter">
        <button type="button" data-filter="all" class="active">All</button>
        <button type="button" data-filter="done">O</button>
        <button type="button" data-filter="partial">~</button>
        <button type="button" data-filter="todo">X</button>
        <button type="button" data-filter="review">*</button>
      </div>
      <div class="button-row">
        <button type="button" id="currentButton" class="current-button" disabled>Current</button>
        <button type="button" id="addSectionButton">Add Section</button>
        <button type="button" id="expandButton">Expand</button>
        <button type="button" id="collapseButton">Collapse</button>
        <button type="button" id="reloadButton">Reload</button>
        <button type="button" id="saveNowButton">Save</button>
        <label class="file-button">
          Import
          <input id="importInput" type="file" accept="application/json,.json">
        </label>
        <button type="button" id="exportButton">Export</button>
      </div>
    </section>

    <details class="sync-panel" aria-label="Google Drive settings">
      <summary>
        <span class="sync-title">Storage</span>
        <span id="driveInfo" class="drive-info">No Drive file linked.</span>
      </summary>
      <div class="sync-body">
        <div class="drive-field">
          <label for="clientIdInput">Google OAuth Client ID</label>
          <input id="clientIdInput" type="text" autocomplete="off" placeholder="000000000000-xxxx.apps.googleusercontent.com">
        </div>
        <div class="drive-actions">
          <button type="button" id="saveClientButton">Save Client ID</button>
          <button type="button" id="signInButton">Connect Google</button>
          <button type="button" id="findFileButton">Find File</button>
          <button type="button" id="createFileButton">Create File</button>
          <button type="button" id="unlinkButton">Unlink</button>
        </div>
      </div>
    </details>

    <main id="board" class="board" aria-live="polite"></main>
  </div>

  <dialog id="itemDialog" class="dialog">
    <form method="dialog" id="itemForm">
      <h2>Add Item</h2>
      <p id="dialogTarget" class="dialog-target"></p>
      <label>
        ID
        <input id="newItemId" name="id" required autocomplete="off">
      </label>
      <label>
        Title
        <input id="newItemTitle" name="title" required autocomplete="off">
      </label>
      <label>
        Status
        <select id="newItemStatus" name="status">
          <option value="none">None</option>
          <option value="done">O Done</option>
          <option value="partial">Partial</option>
          <option value="todo">X Todo</option>
          <option value="review">* Review</option>
        </select>
      </label>
      <div class="dialog-actions">
        <button type="button" id="cancelItemButton">Cancel</button>
        <button type="submit">Add</button>
      </div>
    </form>
  </dialog>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="./config.js"></script>
  <script src="./app.js" defer></script>
</body>
</html>
