<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blackboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1 id="boardTitle">Blackboard</h1>
        <p id="meta" class="meta">JSON 데이터를 불러오는 중</p>
      </div>
      <div class="status-strip" id="stats"></div>
    </header>

    <section class="toolbar" aria-label="blackboard controls">
      <input id="searchInput" class="search" type="search" placeholder="ID, 제목, 내용 검색" autocomplete="off">
      <div class="button-row">
        <button type="button" data-filter="all" class="active">전체</button>
        <button type="button" data-filter="done">O</button>
        <button type="button" data-filter="partial">△</button>
        <button type="button" data-filter="todo">X</button>
        <button type="button" data-filter="review">*</button>
        <button type="button" id="addSectionButton">섹션 추가</button>
        <button type="button" id="expandButton">모두 펼침</button>
        <button type="button" id="collapseButton">모두 접기</button>
        <button type="button" id="reloadButton">새로고침</button>
      </div>
      <div id="saveState" class="save-state">대기 중</div>
    </section>

    <main id="board" class="board" aria-live="polite"></main>
  </div>

  <dialog id="itemDialog" class="dialog">
    <form method="dialog" id="itemForm">
      <h2 id="dialogTitle">항목 추가</h2>
      <p id="dialogTarget" class="dialog-target"></p>
      <label>
        ID
        <input id="newItemId" name="id" required autocomplete="off">
      </label>
      <label>
        제목
        <input id="newItemTitle" name="title" required autocomplete="off">
      </label>
      <label>
        상태
        <select id="newItemStatus" name="status">
          <option value="none">없음</option>
          <option value="done">O 완료</option>
          <option value="partial">△ 부분완료</option>
          <option value="todo">X 미완료</option>
          <option value="review">* 검증필요</option>
        </select>
      </label>
      <div class="dialog-actions">
        <button type="button" id="cancelItemButton">취소</button>
        <button type="submit">추가</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
